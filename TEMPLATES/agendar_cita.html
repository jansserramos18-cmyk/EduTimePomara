<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita - EduTimePoma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/agendar_cita.css') }}">

</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Agendar Nueva Cita</h3>
                    <div>
                        <a href="{{ url_for('dashboard_usuario') }}" class="btn btn-secondary btn-sm">
                            <i class="fas fa-arrow-left"></i> Volver
                        </a>
                    </div>
                </div>
                <div class="card-body">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="fecha_hora" class="form-label">Fecha y Hora</label>
                            <input type="datetime-local" class="form-control" id="fecha_hora" name="fecha_hora" required onchange="filtrarMaestros()">
                        </div>
                        
                        <div class="mb-3">
                            <label for="profesor_id" class="form-label">Seleccionar Maestro</label>
                            <select class="form-select" id="profesor_id" name="profesor_id" required>
                                <option value="">Seleccione un maestro...</option>
                                {% for profesor in profesores %}
                                <option value="{{ profesor.id }}" data-dias="{{ profesor.dias_disponibles }}">{{ profesor.p_nombre }} {{ profesor.p_apellido }} ({{ profesor.correo }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="motivo" class="form-label">Motivo de la Cita</label>
                            <textarea class="form-control" id="motivo" name="motivo" rows="4" placeholder="Describe el motivo de la cita..." required></textarea>
                        </div>
                        
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                            <a href="{{ url_for('dashboard_usuario') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-calendar-check"></i> Agendar Cita
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function filtrarMaestros() {
    const fechaHoraInput = document.getElementById('fecha_hora');
    const profesorSelect = document.getElementById('profesor_id');
    const fechaSeleccionada = new Date(fechaHoraInput.value);
    
    if (!fechaSeleccionada || isNaN(fechaSeleccionada)) {
        // Si no hay fecha, mostrar todos
        Array.from(profesorSelect.options).forEach(option => {
            if (option.value) option.style.display = 'block';
        });
        return;
    }
    
    const diasSemana = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
    const diaSeleccionado = diasSemana[fechaSeleccionada.getDay()];
    
    Array.from(profesorSelect.options).forEach(option => {
        if (!option.value) return; // Skip placeholder
        const diasDisponibles = option.getAttribute('data-dias').split(',');
        if (diasDisponibles.includes(diaSeleccionado)) {
            option.style.display = 'block';
        } else {
            option.style.display = 'none';
        }
    });
    
    // Reset selection if current is hidden
    if (profesorSelect.selectedOptions[0] && profesorSelect.selectedOptions[0].style.display === 'none') {
        profesorSelect.selectedIndex = 0;
    }
}
</script>
</body>
</html>
