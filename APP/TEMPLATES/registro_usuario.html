<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro_usuario.css') }}">
    <title>Registro de Usuario</title>
</head>
<body class="bg-light">
    <div class="container">
        <a href="{{ url_for('home') }}" class="btn btn-secondary mb-3">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
        
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-user-plus"></i> Registrarse como Usuario</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('registro_usuario') }}">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" name="nombre" required>
                    </div>

                    <div class="mb-3">
                        <label for="s_nombre" class="form-label">Segundo Nombre (Opcional):</label>
                        <input type="text" class="form-control" id="s_nombre" placeholder="Tu segundo nombre" name="s_nombre">
                    </div>
                    
                    <div class="mb-3">
                        <label for="apellido_p" class="form-label">Apellido Paterno:</label>
                        <input type="text" class="form-control" id="apellido_p" placeholder="Tu apellido" name="apellido_p" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="apellido_m" class="form-label">Apellido Materno:</label>
                        <input type="text" class="form-control" id="apellido_m" placeholder="Tu apellido" name="apellido_m" required>
                    </div>

                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo Electrónico:</label>
                        <input type="email" class="form-control" id="correo" placeholder="Tu correo" name="correo" required>
                    </div>

                    <div class="mb-3">
                        <label for="contraseña" class="form-label">Contraseña:</label>
                        <input type="password" class="form-control" id="contraseña" placeholder="Tu contraseña" name="contraseña" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-user-plus"></i> Registrarse
                        </button>
                    </div>
                </form>

                <hr>
                <p class="text-center">
                    <small>Al registrarte estás aceptando nuestros <a href="#">términos y condiciones</a></small>
                </p>
                <p class="text-center">
                    <small>¿Ya estás registrado? <a href="{{ url_for('login_usuario') }}">Inicia sesión aquí</a></small>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
